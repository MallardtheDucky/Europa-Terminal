<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNS DAEDALUS - EUROPA-OS v7.5</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --color-primary: #22d3ee; /* Cyan 400 */
            --color-secondary: #0891b2; /* Cyan 600 */
            --color-dark: #082f49; /* Sky 900 */
            --color-bg-deep: #020617; /* Slate 950 */
            --color-alert: #f43f5e; /* Rose 500 */
            --color-warning: #eab308; /* Yellow 500 */
            --color-abyssal: #00050a;
        }

        @font-face {
            font-family: 'Share Tech Mono';
            src: url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        }

        body {
            background-color: var(--color-abyssal);
            color: var(--color-primary);
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            overflow: hidden; 
            cursor: crosshair;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- ANIMATIONS --- */
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .animate-blink { animation: blink 1.2s step-end infinite; }

        @keyframes pulse-slow { 
            0%, 100% { opacity: 0.8; } 
            50% { opacity: 0.3; } 
        }
        .animate-pulse-slow { animation: pulse-slow 4s ease-in-out infinite; }
        
        @keyframes glitch {
            0% { opacity: 1; transform: translate(0); }
            10% { opacity: 0.8; transform: translate(-2px, 1px); }
            20% { opacity: 1; transform: translate(2px, -1px); }
            30% { opacity: 0.5; transform: translate(0); }
            40% { opacity: 1; }
            100% { opacity: 1; }
        }
        .animate-glitch { animation: glitch 3s infinite linear alternate-reverse; }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        .scanline-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(to bottom, transparent, rgba(34, 211, 238, 0.2), transparent);
            opacity: 0.4;
            animation: scanline 6s linear infinite;
            pointer-events: none;
            z-index: 52;
        }

        @keyframes sonar-ping {
            0% { transform: scale(0.1); opacity: 1; border-width: 2px; }
            100% { transform: scale(3); opacity: 0; border-width: 0px; }
        }

        /* SVG Graph Animations */
        @keyframes draw-line {
            to { stroke-dashoffset: 0; }
        }
        .animate-draw {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: draw-line 3s ease-out forwards;
        }
        
        @keyframes ekg-slide {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }
        .animate-ekg {
            animation: ekg-slide 2s linear infinite;
        }

        /* --- CUSTOM CLASSES --- */
        .text-shadow-cyan { text-shadow: 0 0 4px rgba(34, 211, 238, 0.7), 0 0 12px rgba(34, 211, 238, 0.3); }
        .text-shadow-alert { text-shadow: 0 0 4px rgba(244, 63, 94, 0.7), 0 0 12px rgba(244, 63, 94, 0.3); }

        .deep-water-bg {
            background: radial-gradient(circle at center, var(--color-dark) 0%, var(--color-bg-deep) 60%, var(--color-abyssal) 100%);
        }

        /* Improved Scrollbar */
        .custom-scrollbar { scrollbar-width: thin; scrollbar-color: var(--color-secondary) rgba(0, 5, 10, 0.8); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0, 5, 10, 0.8); border-left: 1px solid rgba(8, 145, 178, 0.3); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--color-secondary); border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--color-primary); }

        /* CRT Overlay Layers */
        .scanlines {
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%), linear-gradient(90deg, rgba(255,0,0,0.04), rgba(0,255,255,0.02), rgba(0,0,255,0.04));
            background-size: 100% 4px, 4px 100%;
            pointer-events: none;
            z-index: 50;
        }
        
        .crt-overlay {
            background: radial-gradient(circle, rgba(34,211,238,0.03) 50%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 51;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.9);
        }
        
        .grid-bg-cyan {
            background-image: 
                linear-gradient(rgba(8, 145, 178, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(8, 145, 178, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .btn-cyan {
            border: 1px solid var(--color-secondary);
            background: rgba(8, 145, 178, 0.1);
            color: var(--color-primary);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .btn-cyan::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(34,211,238,0.2), transparent);
            transition: left 0.4s;
        }
        .btn-cyan:hover::before { left: 100%; }
        .btn-cyan:hover {
            background: rgba(34, 211, 238, 0.15);
            border-color: var(--color-primary);
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.4), inset 0 0 10px rgba(34, 211, 238, 0.2);
        }
    </style>
</head>
<body>

    <!-- Root Container -->
    <div id="root" class="fixed inset-0 bg-black overflow-hidden selection:bg-cyan-500 selection:text-black"></div>

<script>
    // --- LORE & DATA (BENEATH EUROPA) ---
    const CURRENT_DATE = "2148.11.04";
    const SHIP_NAME = "UNS DAEDALUS";
    const SYS_VERSION = "EUROPA-OS v7.5";

    const PROLOGUE_TEXT = [
        "EUROPA-OS // KERNEL v7.5.1 INITIALIZING...",
        "MOUNTING ENCRYPTED VOLUMES....... [OK]",
        "ESTABLISHING LOCAL COMMS LINK....... [OK]",
        "CALIBRATING DEPTH SENSORS....... [OK - 18.4KM]",
        " ",
        "===========================================================",
        "        E U R O P A   O P E R A T I O N S   A R C H I V E",
        "        Personnel Briefing Excerpt - SEC: 44-A",
        "        Revision 7.5 - Authorized Distribution",
        "===========================================================",
        " ",
        "Europa, the fourth-largest moon of Jupiter, was confirmed to harbor",
        "a liquid subsurface ocean following the Borealis Ice Penetration",
        "Expedition of 2086. Shielded beneath 20 kilometers of frozen, ",
        "irradiated crust, this abyssal ocean remains humanity's greatest",
        "extraterrestrial discovery.",
        " ",
        "Despite its hostility, Europa has become a place where thousands of",
        "people live and work. Dozens of research stations, mining facilities,",
        "and communications relays have been established beneath the ice.",
        " ",
        "You serve aboard the UNS DAEDALUS, a Class-IV Heavy Submersible.",
        "Unlike research or military craft, the Daedalus exists for one purpose:",
        "traveling from station to station repairing reactors, replacing damaged",
        "equipment, and ensuring isolated outposts remain habitable.",
        " ",
        "===========================================================",
        "CURRENT ASSIGNMENT: Service Rotation 42-B",
        " ",
        "Scheduled destinations:",
        " • Station Aster   — Communications Array Calibration",
        " • Station Nereid  — Geothermal Reactor Inspection",
        " • Station Echo    — Environmental Systems & Bio-filter Purge",
        " ",
        "Estimated mission duration: 31 Days.",
        "Submersion Depth: 18.4 KM.",
        "Status: Nominal. No operational abnormalities reported.",
        "===========================================================",
        " ",
        "[SYSTEM NOTE: This document was generated 18 hours before the]",
        "[unexplained loss of contact with Station Echo.]",
        " ",
        "DECRYPTING LOGS................ [COMPLETE]",
        "MOUNTING USER INTERFACE........ [COMPLETE]",
        "PRESS [INITIALIZE] TO ACCESS TERMINAL MAIN MENU."
    ];

    const EMAILS = [
        {
            id: 'msg_001', from: 'CAPT. R. VANCE', title: 'Cmd', to: 'ALL CREW', subject: 'Rotation 42-B Orders', date: '2148.11.03 - 08:00',
            body: 'Listen up.\n\nWe are on schedule for Aster, Nereid, and Echo. Standard diagnostic sweeps, filter replacements, and reactor checks. I don\'t want to be floating in this tin can longer than we have to. \n\nGet the diagnostic array calibrated before we hit Aster. The ice shifting has been messing with the sonar relays. \n\nWe live and die by the maintenance schedule down here. Do not cut corners.\n\n- Vance'
        },
        {
            id: 'msg_002', from: 'ENG. T. KAEL', title: 'H-Mach', to: 'TECH-SYS', subject: 'Re: Heating coils', date: '2148.11.04 - 11:42',
            body: 'Are you going to fix the ambient heating in Sector 4 or do I need to freeze to death first?\n\nI swear the ambient temp is dropping by the hour. I brought it up to Vance but he just told me to put on another layer. We\'re under twenty kilometers of ice, the water outside is barely above freezing, and my console is icing over.\n\nAlso, check the comms buffer. I keep getting pinged by automated freight drones that aren\'t on the manifest. Their routing codes look decades old.'
        },
        {
            id: 'msg_003', from: 'OFC. I. KORSAKOV', title: 'Sec/Ops', to: 'TECH-SYS', subject: 'Classified: Borealis Manifest', date: '2148.11.04 - 12:15',
            body: 'I was digging through the routing codes Kael mentioned. They aren\'t automated freight drones. \n\nThe network signatures belong to vessels from the original Borealis Expedition of 2086. The ones that supposedly collapsed during the first ice penetration drill. \n\nWhy is our navigation grid receiving handshake requests from ships that have been crushed under the ice for sixty years? Do not forward this to Vance yet. I need to run a trace on the broadcast origin.'
        },
        {
            id: 'msg_004', from: 'STATION ECHO (AUTO)', title: 'Auto', to: 'UNS DAEDALUS', subject: 'ROUTINE CHECK-IN FAILED', date: '2148.11.04 - 13:00',
            body: 'AUTOMATED DIAGNOSTIC LOG:\n\n> FACILITY POWER: NOMINAL\n> LIFE SUPPORT: NOMINAL\n> INTERNAL SENSORS: ACTIVE\n> PERSONNEL DETECTED: 0\n\nERR: SCHEDULED_MAINTENANCE_MISSED\nERR: COMMUNICATIONS_SILENCE\n\n[ATTACHED NOTE - DR. ARIS, ECHO COMMAND]:\n"If anyone receives this, do not dock at Bay 3. The airlock cycled on its own. We didn\'t authorize a submersible. The cameras are functioning but they aren\'t showing the water outside. They\'re just showing... geometry. I don\'t know how else to describe it. We are locking down the core."'
        },
        {
            id: 'msg_005', from: 'DR. E. THORNE', title: 'Med/Bio', to: 'TECH-SYS', subject: 'Sensor Anomaly - External', date: '2148.11.04 - 14:10',
            body: 'Could you run a diagnostic on the port-side biological sensors?\n\nI was logging the local fauna—just the usual bioluminescent ribbon-swimmers near the thermal vents—but the sensor registered a massive displacement. Over 8,400 cubic meters. \n\nIt vanished a second later. Must be a software glitch, right? Nothing down here gets that big. The ecosystem doesn\'t support macro-predators.\n\nJust clear the cache when you have a minute. It\'s ruining my data sets.'
        },
        {
            id: 'msg_006', from: 'ENG. T. KAEL', title: 'H-Mach', to: 'TECH-SYS', subject: 'Why did you do that?', date: '2148.11.06 - 03:14', isAnomaly: true,
            body: 'I am looking right at the access logs.\n\nWhy did you open the outer airlock? We are submerged. You didn\'t cycle the depressurization. \n\nI am trying to override from engineering but the network is locking me out. It doesn\'t even look like our OS anymore. What is this code? It looks like a map.\n\nPlease respond. The water is rising in the lower decks. The things from the vents are coming inside.'
        }
    ];

    const CREW = [
        { id: 'vance', name: 'VANCE, R.', rank: 'Captain', dept: 'Command', status: 'ACTIVE', loc: 'Bridge', hr: 72, blood: 'O+', o2: '98%', psych: 'Stable. Exhibits slight agitation regarding corporate scheduling. Command aptitude high.', notes: 'Logged 4000+ hours in sub-ice vessels. Strict adherence to protocol.' },
        { id: 'kael', name: 'KAEL, T.', rank: 'Chief Engineer', dept: 'Heavy Machinery', status: 'ACTIVE', loc: 'Engine Room', hr: 84, blood: 'A-', o2: '96%', psych: 'Elevated stress levels. Frequent complaints regarding temperature regulation and auditory hallucinations ("groaning hull").', notes: 'Requested transfer back to surface operations twice this cycle. Denied by corporate.' },
        { id: 'thorne', name: 'THORNE, E.', rank: 'Lead Researcher', dept: 'Medical/Biology', status: 'ACTIVE', loc: 'Medbay', hr: 68, blood: 'AB+', o2: '99%', psych: 'Focused, analytical. Mild obsession with recent anomalous bio-scans.', notes: 'Conducting unauthorized sonar pings attempting to track macro-fauna. Reprimanded by Capt. Vance.' },
        { id: 'korsakov', name: 'KORSAKOV, I.', rank: 'Security Chief', dept: 'Operations', status: 'ACTIVE', loc: 'Sec-Hub', hr: 88, blood: 'B+', o2: '97%', psych: 'Paranoid tendencies. Hyper-vigilant regarding network integrity.', notes: 'Currently investigating ghost-signals from obsolete network nodes.' },
        { id: 'lin', name: 'LIN, J.', rank: 'Helmsman', dept: 'Navigation', status: 'ACTIVE', loc: 'Bridge', hr: 62, blood: 'O-', o2: '98%', psych: 'Calm under pressure. Reporting spatial disorientation during last watch.', notes: 'Stated the navigation grid mapping "no longer matches physical exterior geometry."' },
        { id: 'player', name: 'PLAYER_UNIT', rank: 'Sys-Tech', dept: 'IT / Diagnostics', status: 'ACTIVE', loc: 'Terminal A', hr: 75, blood: 'B-', o2: '97%', psych: 'Nominal. Standard operational capacity.', notes: 'System access elevated to Level 4 due to automated network failures across the sector.' },
    ];

    const STATIONS = [
        { id: 'daedalus', name: 'UNS DAEDALUS', type: 'Vessel', status: 'ACTIVE', x: 20, y: 50, desc: 'Current Location. Maintenance Class Sub-Ice Vessel. Propelling at 12 knots.' },
        { id: 'aster', name: 'STATION ASTER', type: 'Comms Relay', status: 'ONLINE', x: 45, y: 30, desc: 'Primary communications hub. Routing data to surface ice-penetrating radar.' },
        { id: 'nereid', name: 'STATION NEREID', type: 'Mining Hub', status: 'ONLINE', x: 70, y: 60, desc: 'Geothermal extraction and mineral processing. Structural integrity at 98%.' },
        { id: 'echo', name: 'STATION ECHO', type: 'Bio-Research', status: 'LOS', x: 85, y: 20, desc: 'Classified biological cataloging. NO PERSONNEL DETECTED. SYSTEMS FUNCTIONING ABNORMALLY.', alert: true }
    ];

    const SECTORS = {
        'bridge': { name: 'Command & Bridge', status: 'NOMINAL', color: 'cyan', text: 'Helm controls and primary sensor arrays functioning normally. Pilot Lin reports localized spatial anomalies on grid mapping.' },
        'med': { name: 'Science & Medbay', status: 'NOMINAL', color: 'cyan', text: 'Bio-filters operating efficiently. Dr. Thorne\'s local fauna tracking array is utilizing 14% more power than authorized.' },
        'life': { name: 'Life Support', status: 'NOMINAL', color: 'cyan', text: 'O2 scrubbers functioning within acceptable parameters. Trace biological particulate filtered successfully.' },
        'cargo': { name: 'Cargo & Drones', status: 'IDLE', color: 'cyan', text: 'Automated freight manifests are empty. Drone bays sealed.' },
        'engine': { name: 'Reactor Core', status: 'OPTIMAL', color: 'cyan', text: 'Fusion reactor TR-4 stable. Output at 1.21 GW. Magnetic coils holding containment perfectly.' },
        'sec4': { name: 'Sector 4 / Airlock', status: 'CRITICAL', color: 'red', text: 'Severe thermal drain detected. Ambient temperature near freezing. Outer diving bell sensors unresponsive.' }
    };

    // --- GLOBAL STATE ---
    window.state = {
        phase: 'boot', 
        activeApp: null, 
        comms: { selectedId: null },
        nav: { selectedStation: null },
        eng: { 
            selectedSector: 'bridge',
            rerouteMode: false,
            powerLevels: { bridge: 85, med: 92, life: 98, cargo: 100, engine: 100, sec4: 12 },
            subsystems: {
                bridge: [{id: 'nav', name: 'Nav-Grid Link', active: true}, {id: 'sonar', name: 'Sonar Array', active: true}],
                med: [{id: 'bio', name: 'Bio-Scrubbers', active: true}, {id: 'cryo', name: 'Cryo-Storage', active: true}],
                life: [{id: 'o2', name: 'O2 Generation', active: true}, {id: 'temp', name: 'Temp Regulation', active: true}],
                cargo: [{id: 'drone', name: 'Drone Bay', active: false}, {id: 'mag', name: 'Mag-Locks', active: true}],
                engine: [{id: 'fusion', name: 'Fusion Core', active: true}, {id: 'cool', name: 'Coolant Flow', active: true}],
                sec4: [{id: 'heat', name: 'Thermal Coils', active: false}, {id: 'airlock', name: 'Outer Airlock', active: false}]
            }
        },
        anomalyGlimpse: false,
        activePopupConfig: null
    };

    window.setState = (newState) => {
        let shouldRender = false;
        Object.keys(newState).forEach(key => {
            if (typeof newState[key] === 'object' && newState[key] !== null && !Array.isArray(newState[key]) && window.state[key]) {
                window.state[key] = { ...window.state[key], ...newState[key] };
            } else {
                window.state[key] = newState[key];
            }
            shouldRender = true;
        });
        if (shouldRender) {
            renderApp();
            lucide.createIcons();
        }
    };

    // --- INTERACTIVE ENGINEERING LOGIC ---
    window.toggleSubsystem = (sector, id) => {
        const eng = window.state.eng;
        const updatedSector = eng.subsystems[sector].map(sub => {
            if(sub.id === id) return { ...sub, active: !sub.active };
            return sub;
        });
        
        window.setState({ eng: { ...eng, subsystems: { ...eng.subsystems, [sector]: updatedSector } } });

        // The Anomaly Trap for Sector 4
        if (sector === 'sec4') {
            setTimeout(() => {
                const forcedSector = window.state.eng.subsystems.sec4.map(sub => {
                    if(sub.id === id) return { ...sub, active: false };
                    return sub;
                });
                window.setState({ 
                    eng: { ...window.state.eng, subsystems: { ...window.state.eng.subsystems, sec4: forcedSector } },
                    anomalyGlimpse: true 
                });
                setTimeout(() => window.setState({ anomalyGlimpse: false }), 150);
            }, 600);
        }
    };

    window.adjustPower = (sector, amount) => {
        // If attempting to give power to Sector 4, trigger the glitch event
        if (sector === 'sec4' && amount > 0) {
            window.setState({ anomalyGlimpse: true });
            setTimeout(() => window.setState({ anomalyGlimpse: false }), 150);
            setTimeout(() => window.setState({ anomalyGlimpse: true }), 300);
            setTimeout(() => {
                window.setState({ 
                    anomalyGlimpse: false, 
                    activePopupConfig: { type: 'alert', id: 'power_fail', title: 'REROUTE FAILED // EXTERNAL DRAIN', color: 'red' } 
                });
                const eng = window.state.eng;
                window.setState({ eng: { ...eng, rerouteMode: false, powerLevels: { ...eng.powerLevels, sec4: 0 } } });
            }, 400);
            return;
        }
        
        const eng = window.state.eng;
        let current = eng.powerLevels[sector];
        let next = Math.max(0, Math.min(100, current + amount));
        window.setState({ eng: { ...eng, powerLevels: { ...eng.powerLevels, [sector]: next } } });
    };

    // --- TIMERS & GLITCHES ---
    setInterval(() => {
        const timeString = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const clockEl = document.getElementById('system-clock');
        if (clockEl) clockEl.innerText = timeString;
    }, 1000);

    setInterval(() => {
        if (window.state.phase === 'desktop' && Math.random() > 0.94) {
            window.setState({ anomalyGlimpse: true });
            setTimeout(() => { window.setState({ anomalyGlimpse: false }); }, 100 + Math.random() * 150);
        }
    }, 4500);

    // --- RENDERING SYSTEM ---
    const root = document.getElementById('root');

    function renderApp() {
        if (!document.getElementById('shell-container')) {
            root.innerHTML = `
                ${renderCRTOverlay()}
                <div id="shell-container" class="h-full w-full p-0 md:p-6 transition-opacity duration-1000">
                    <div class="h-full w-full border border-cyan-900 md:border-2 md:border-cyan-800 rounded-none md:rounded-lg deep-water-bg relative shadow-[0_0_0_1px_#082f49,0_0_60px_rgba(8,47,73,0.9)] overflow-hidden flex flex-col box-border">
                        <div id="screen-content" class="flex-1 overflow-hidden relative z-10 text-cyan-400"></div>
                    </div>
                </div>
                <div id="modal-layer"></div>
                <div id="popup-layer"></div>
            `;
        }

        const screenContent = document.getElementById('screen-content');
        const modalLayer = document.getElementById('modal-layer');
        const popupLayer = document.getElementById('popup-layer');
        const { phase, activeApp, anomalyGlimpse, activePopupConfig } = window.state;

        if (anomalyGlimpse) {
            screenContent.classList.add('animate-glitch', 'hue-rotate-15', 'contrast-125');
        } else {
            screenContent.classList.remove('animate-glitch', 'hue-rotate-15', 'contrast-125');
        }

        if (phase === 'boot') {
             if (screenContent.innerHTML.indexOf('boot-container-active') === -1) {
                 screenContent.innerHTML = renderBootLayout();
             }
             modalLayer.innerHTML = '';
        } else if (phase === 'desktop') {
            modalLayer.innerHTML = activeApp ? renderModalWindow() : '';
            if (screenContent.innerHTML.indexOf('desktop-interface') === -1) {
                 screenContent.innerHTML = renderMainInterface();
            }
        }
        
        if (popupLayer) {
            popupLayer.innerHTML = renderGlobalPopup();
        }
    }

    function renderCRTOverlay() {
        return `
        <div class="pointer-events-none fixed inset-0 z-50 overflow-hidden mix-blend-overlay">
            <div class="absolute inset-0 scanlines"></div>
            <div class="absolute inset-0 crt-overlay"></div>
            <div class="scanline-bar"></div>
        </div>`;
    }

    // --- ISOLATED BOOT SEQUENCE ---
    let bootTimer = null;
    function renderBootLayout() {
        return `
            <div id="boot-container-active" class="h-full w-full p-8 flex flex-col bg-[#000205] relative font-mono text-[13px] md:text-sm">
                <div class="flex justify-between items-center mb-6 border-b border-cyan-800/50 pb-2 shrink-0">
                    <div class="flex items-center gap-4">
                        <div class="text-cyan-600 font-bold tracking-widest text-lg">EUROPA-OS <span class="text-xs text-cyan-800 font-normal">v7.5</span></div>
                        <div class="h-1 w-12 bg-cyan-900 relative overflow-hidden">
                            <div class="absolute top-0 left-0 h-full bg-cyan-500 animate-pulse w-full"></div>
                        </div>
                    </div>
                    <button id="skip-boot-btn" onclick="skipBootFast()" class="text-[10px] z-50 text-cyan-600 hover:text-cyan-300 border border-cyan-800 px-3 py-1 uppercase tracking-widest hover:bg-cyan-900/30 transition-colors cursor-pointer">Skip Boot</button>
                </div>
                <div id="boot-log-container" class="flex-1 overflow-y-auto custom-scrollbar pr-4 leading-relaxed text-shadow-cyan"></div>
                <div id="boot-action-container" class="mt-8 flex justify-center pb-8 shrink-0 hidden">
                    <button onclick="window.setState({ phase: 'desktop' })" class="btn-cyan px-10 py-4 text-xl font-bold tracking-[0.2em] uppercase shadow-[0_0_20px_rgba(34,211,238,0.2)]">
                        [ SYSTEM INITIALIZATION ]
                    </button>
                </div>
            </div>
        `;
    }

    function startBoot() {
        let lineIdx = 0;
        let charIdx = 0;
        let currentLineText = "";
        
        const logContainer = document.getElementById('boot-log-container');
        if (!logContainer) return;
        logContainer.innerHTML = '';
        
        let activeLineEl = document.createElement('div');
        activeLineEl.className = "mb-1 min-h-[1.2em] text-cyan-200";
        logContainer.appendChild(activeLineEl);

        function typeChar() {
            if (lineIdx >= PROLOGUE_TEXT.length) {
                finishBoot();
                return;
            }
            const fullLine = PROLOGUE_TEXT[lineIdx];
            
            if (charIdx < fullLine.length) {
                currentLineText += fullLine[charIdx];
                activeLineEl.innerHTML = currentLineText.replace(/ /g, '&nbsp;') + '<span class="inline-block w-2 h-4 bg-cyan-400 align-middle ml-1"></span>';
                charIdx++;
                logContainer.scrollTop = logContainer.scrollHeight;
                
                let delay = Math.random() * 10 + 5; 
                if (fullLine[charIdx - 1] === '.') delay += 30;
                bootTimer = setTimeout(typeChar, delay);
            } else {
                // Line finished
                activeLineEl.innerHTML = currentLineText.replace(/ /g, '&nbsp;');
                
                // Color formatting for completed line
                let colorClass = 'text-cyan-400';
                if (currentLineText.includes('Station Echo')) colorClass = 'text-red-400 font-bold';
                if (currentLineText.includes('====')) colorClass = 'text-cyan-800';
                if (currentLineText.includes('ERR:') || currentLineText.includes('unexplained loss')) colorClass = 'text-yellow-500';
                activeLineEl.className = `mb-1 min-h-[1.2em] ${colorClass}`;
                
                lineIdx++;
                charIdx = 0;
                currentLineText = "";
                
                if (lineIdx < PROLOGUE_TEXT.length) {
                    activeLineEl = document.createElement('div');
                    activeLineEl.className = "mb-1 min-h-[1.2em] text-cyan-200";
                    logContainer.appendChild(activeLineEl);
                }
                
                let lineDelay = 150 + Math.random() * 200;
                if (fullLine.includes("==================")) lineDelay = 20;
                if (fullLine.includes("[COMPLETE]")) lineDelay = 400;
                
                logContainer.scrollTop = logContainer.scrollHeight;
                bootTimer = setTimeout(typeChar, lineDelay);
            }
        }
        typeChar();
    }

    function skipBootFast() {
        if (bootTimer) clearTimeout(bootTimer);
        const logContainer = document.getElementById('boot-log-container');
        if (!logContainer) return;
        
        let allHtml = '';
        PROLOGUE_TEXT.forEach(line => {
            let colorClass = 'text-cyan-400';
            if (line.includes('Station Echo')) colorClass = 'text-red-400 font-bold';
            if (line.includes('====')) colorClass = 'text-cyan-800';
            if (line.includes('ERR:') || line.includes('unexplained loss')) colorClass = 'text-yellow-500';
            allHtml += `<div class="mb-1 min-h-[1.2em] ${colorClass}">${line.replace(/ /g, '&nbsp;')}</div>`;
        });
        logContainer.innerHTML = allHtml;
        logContainer.scrollTop = logContainer.scrollHeight;
        finishBoot();
    }

    function finishBoot() {
        const btn = document.getElementById('skip-boot-btn');
        if (btn) btn.style.display = 'none';
        
        const actionContainer = document.getElementById('boot-action-container');
        if (actionContainer) {
            actionContainer.classList.remove('hidden');
            actionContainer.classList.add('animate-fade-in');

    }

                        <div class='bg-black p-4 border border-red-900/50 rounded border-l-4 border-l-red-600 shadow-[inset_0_0_10px_rgba(239,68,68,0.2)] text-red-300'>
                            "They opened the outer airlock. I tried to stop them but they just kept staring at the viewing port. The water is so cold. It's coming in."
